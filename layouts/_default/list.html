{{ define "main" }}
<div class="list-page">
  <header>
    <h1>{{ .Title }}</h1>
  </header>
  <div class="content">
    {{ .Content }}
  </div>
  <ul class="list-items">
    {{ range .Pages }}
    <li>
      <span class="date">{{ .Date.Format "Jan 2, 2006" }}</span>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
